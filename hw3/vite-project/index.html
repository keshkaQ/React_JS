<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vite-project</title>
  </head>
  <body>
    <script type="module" src="/src/main.js"></script>

    <div class="container">
      <header>Мой список задач</header>
      <main>
        <section class="controls">
          <div class="add-btn">
            <button class="btn btn-primary">Добавить задачу</button>
          </div>
          <div class="sort-btn">
            <button class="btn btn-secondary">Сортировать</button>
          </div>
          <div class="theme-btn">
            <button class="btn btn-theme">Тема</button>
          </div>
        </section>

         <section class="tasks-section">
          <div class="stats">
            <span><strong class="task-count">0</strong></span>
          </div>
          <ol class="tasks-list"></ol>
        </section>
      </main>
 
      <footer>
        <p>&copy; 2026 vite-todo-app</p>
      </footer>
      </main>
    </div>
  </body>
</html>
